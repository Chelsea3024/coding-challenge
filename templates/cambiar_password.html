<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Password</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="auth-container">
        <div class="auth-header">
            <h1>Change Password</h1>
            <p>Enter your new password</p>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                <div class="flash-messages">
                    {% for category, message in messages %}
                        <div class="flash-message {{ category }}">
                            {{ message }}
                        </div>
                    {% endfor %}
                </div>
            {% endif %}
        {% endwith %}

        <form method="post">
            <input type="hidden" name="token" value="{{ token }}">

            <div class="form-group">
                <label>New Password</label>
                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" name="nueva_password" placeholder="Minimum 8 characters" required>
                </div>
            </div>

            <div class="form-group">
                <label>Confirm Password</label>
                <div class="input-group">
                    <i class="fas fa-check-circle"></i>
                    <input type="password" name="confirmar_password" placeholder="Repeat your password" required>
                </div>
            </div>

            <button type="submit" class="btn-primary">
                <i class="fas fa-save" style="margin-right: 8px;"></i> UPDATE
            </button>
        </form>
    </div>
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
